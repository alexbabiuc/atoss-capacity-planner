spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/capacity_planner
    username: capacity_planner
    password: capacity_planner
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    user:
      name: admin
      password: admin

app:
  # Default planning window shown on load
  planning:
    default-granularity: MONTH    # WEEK | MONTH | QUARTER
    default-horizon-months: 12

  # Derivation thresholds (all overridable per team/skill)
  capacity:
    default-overhead-factor: 0.15
    default-support-factor: 0.10
    critical-resource-holder-threshold: 1   # ≤ N available holders = critical

logging:
  level:
    com.capacityplanner: DEBUG
